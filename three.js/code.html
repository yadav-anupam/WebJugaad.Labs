<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_THREEJS_START:ANIMATION_3 class="fixed inset-0 w-full h-full bg-transparent" -->
<div class="fixed inset-0 w-full h-full bg-transparent" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_3" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_3');
  const devicePixelRatio = window.devicePixelRatio || 1;
  // Initialize Three.js scene
const width = container.clientWidth || window.innerWidth;
const height = container.clientHeight || window.innerHeight;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
camera.position.z = 8;

const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(width, height);
container.appendChild(renderer.domElement);

const group = new THREE.Group();
scene.add(group);

// Core: Tech Crystal (Icosahedron)
const geometry = new THREE.IcosahedronGeometry(2, 1);
const material = new THREE.MeshPhongMaterial({
    color: 0x004ac6,
    emissive: 0x001a4d,
    specular: 0xffffff,
    shininess: 100,
    transparent: true,
    opacity: 0.3,
    flatShading: true
});
const crystal = new THREE.Mesh(geometry, material);
group.add(crystal);

// Wireframe Shell
const wireframeGeo = new THREE.IcosahedronGeometry(2.05, 1);
const wireframeMat = new THREE.LineBasicMaterial({ 
    color: 0x2563eb, 
    transparent: true, 
    opacity: 0.6 
});
const wireframe = new THREE.LineSegments(new THREE.EdgesGeometry(wireframeGeo), wireframeMat);
group.add(wireframe);

// Inner Glowing Core
const coreGeo = new THREE.SphereGeometry(0.8, 32, 32);
const coreMat = new THREE.MeshPhongMaterial({
    color: 0xffffff,
    emissive: 0x2563eb,
    emissiveIntensity: 2,
    transparent: true,
    opacity: 0.8
});
const core = new THREE.Mesh(coreGeo, coreMat);
group.add(core);

// Particles System
const particlesCount = 300;
const positions = new Float32Array(particlesCount * 3);
const particleGeometry = new THREE.BufferGeometry();

for (let i = 0; i < particlesCount; i++) {
    const r = 3 + Math.random() * 2;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos((Math.random() * 2) - 1);
    
    positions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
    positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
    positions[i * 3 + 2] = r * Math.cos(phi);
}

particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
const particleMaterial = new THREE.PointsMaterial({
    color: 0x2563eb,
    size: 0.05,
    transparent: true,
    opacity: 0.8,
    sizeAttenuation: true
});
const particles = new THREE.Points(particleGeometry, particleMaterial);
group.add(particles);

// Lighting
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const pointLight = new THREE.PointLight(0x2563eb, 2, 10);
pointLight.position.set(5, 5, 5);
scene.add(pointLight);

// Interaction
let mouseX = 0;
let mouseY = 0;
let targetX = 0;
let targetY = 0;

window.addEventListener('mousemove', (e) => {
    mouseX = (e.clientX - window.innerWidth / 2) / 1000;
    mouseY = (e.clientY - window.innerHeight / 2) / 1000;
});

// Animation Loop
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);
    const delta = clock.getDelta();
    const elapsed = clock.getElapsedTime();

    // Smooth rotation
    targetX += (mouseX - targetX) * 0.05;
    targetY += (mouseY - targetY) * 0.05;
    
    group.rotation.y += delta * 0.2 + targetX;
    group.rotation.x += delta * 0.1 + targetY;
    
    // Core pulsing
    core.scale.setScalar(1 + Math.sin(elapsed * 2) * 0.1);
    
    // Float effect
    group.position.y = Math.sin(elapsed * 0.5) * 0.2;
    
    // Particles slow orbit
    particles.rotation.y -= delta * 0.05;

    renderer.render(scene, camera);
}

animate();

// Resize Handler
window.addEventListener('resize', () => {
    const w = container.clientWidth || window.innerWidth;
    const h = container.clientHeight || window.innerHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
});
})();
</script>
</div>
<!-- STITCH_THREEJS_END:ANIMATION_3 -->
</body>
</html>
